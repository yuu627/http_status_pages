<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>303 See Other</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top right, rgba(255, 170, 190, 0.14), transparent 28%),
        radial-gradient(circle at bottom left, rgba(125, 200, 255, 0.13), transparent 34%),
        linear-gradient(180deg, #07111f 0%, #0b1c30 48%, #132942 100%);
      color: #eef6ff;
      font-family: "DotGothic16", "Yu Gothic", sans-serif;
      overflow: hidden;
      padding: 24px;
    }

    .wrap {
      width: min(92%, 860px);
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 48px;
      align-items: center;
      padding: 40px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(6px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0;
      font-size: clamp(72px, 14vw, 140px);
      line-height: 0.95;
      letter-spacing: 0.04em;
      color: #ffb7c5;
    }

    h2 {
      margin: 14px 0 20px;
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 400;
      line-height: 1.2;
      color: #eef6ff;
    }

    p {
      margin: 0;
      font-size: 18px;
      line-height: 1.9;
      color: #d9e9f8;
    }

    .small {
      margin-top: 18px;
      font-size: 13px;
      letter-spacing: 0.08em;
      color: #90abc5;
      text-transform: uppercase;
    }

    .creaturebox {
      display: grid;
      place-items: center;
      position: relative;
      min-height: 220px;
    }

    .flow {
      position: absolute;
      width: 240px;
      height: 90px;
      border: 1px solid rgba(255, 183, 197, 0.24);
      border-radius: 50%;
      transform: rotate(-12deg);
      animation: pulse 5s ease-in-out infinite;
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(180, 220, 255, 0.16);
      animation: float 4s ease-in-out infinite;
    }

    .b1 {
      width: 18px;
      height: 18px;
      top: 12px;
      right: 26px;
    }

    .b2 {
      width: 10px;
      height: 10px;
      top: 54px;
      right: 74px;
      animation-delay: .8s;
    }

    .b3 {
      width: 14px;
      height: 14px;
      top: 96px;
      right: 18px;
      animation-delay: 1.6s;
    }

    .shrimp {
      position: relative;
      width: 216px;
      height: 144px;
      transform: translateX(-18px);
      filter:
        drop-shadow(0 12px 18px rgba(0,0,0,0.35))
        drop-shadow(0 0 18px rgba(255,183,197,0.2));
      animation: drift 5.2s ease-in-out infinite;
    }

    .shrimp::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 9px;
      height: 9px;
      background: transparent;
      box-shadow:
        117px 9px 0 #1b2636,
        126px 9px 0 #1b2636,
        108px 18px 0 #1b2636,
        117px 18px 0 #ff7f8f,
        126px 18px 0 #ff7f8f,
        135px 18px 0 #ff7f8f,
        144px 18px 0 #1b2636,
        99px 27px 0 #1b2636,
        108px 27px 0 #ff7f8f,
        117px 27px 0 #ff7f8f,
        126px 27px 0 #ffd0d8,
        135px 27px 0 #ffd0d8,
        144px 27px 0 #ff7f8f,
        153px 27px 0 #1b2636,
        90px 36px 0 #1b2636,
        99px 36px 0 #ff7f8f,
        108px 36px 0 #ff7f8f,
        117px 36px 0 #ffd0d8,
        126px 36px 0 #ffd0d8,
        135px 36px 0 #ffd0d8,
        144px 36px 0 #ffd0d8,
        153px 36px 0 #ff7f8f,
        162px 36px 0 #1b2636,
        81px 45px 0 #1b2636,
        90px 45px 0 #ff7f8f,
        99px 45px 0 #ff7f8f,
        108px 45px 0 #ff7f8f,
        117px 45px 0 #ffd0d8,
        126px 45px 0 #ffd0d8,
        135px 45px 0 #ff7f8f,
        144px 45px 0 #ff7f8f,
        153px 45px 0 #ff7f8f,
        162px 45px 0 #1b2636,
        72px 54px 0 #1b2636,
        81px 54px 0 #ff7f8f,
        90px 54px 0 #ff7f8f,
        99px 54px 0 #d94b62,
        108px 54px 0 #d94b62,
        117px 54px 0 #ff7f8f,
        126px 54px 0 #ff7f8f,
        135px 54px 0 #d94b62,
        144px 54px 0 #d94b62,
        153px 54px 0 #ff7f8f,
        162px 54px 0 #1b2636,
        63px 63px 0 #1b2636,
        72px 63px 0 #ff7f8f,
        81px 63px 0 #ff7f8f,
        90px 63px 0 #d94b62,
        99px 63px 0 #ff7f8f,
        108px 63px 0 #ff7f8f,
        117px 63px 0 #ff7f8f,
        126px 63px 0 #d94b62,
        135px 63px 0 #d94b62,
        144px 63px 0 #ff7f8f,
        153px 63px 0 #1b2636,
        54px 72px 0 #1b2636,
        63px 72px 0 #ff7f8f,
        72px 72px 0 #ff7f8f,
        81px 72px 0 #d94b62,
        90px 72px 0 #ff7f8f,
        99px 72px 0 #ff7f8f,
        108px 72px 0 #ff7f8f,
        117px 72px 0 #1b2636,
        126px 72px 0 #1b2636,
        135px 72px 0 #ff7f8f,
        144px 72px 0 #ff7f8f,
        153px 72px 0 #ff7f8f,
        162px 72px 0 #1b2636,
        45px 81px 0 #1b2636,
        54px 81px 0 #ff7f8f,
        63px 81px 0 #ff7f8f,
        72px 81px 0 #d94b62,
        81px 81px 0 #ff7f8f,
        90px 81px 0 #ff7f8f,
        99px 81px 0 #ff7f8f,
        108px 81px 0 #1b2636,
        117px 81px 0 #1b2636,
        126px 81px 0 #1b2636,
        36px 90px 0 #1b2636,
        45px 90px 0 #ff7f8f,
        54px 90px 0 #ff7f8f,
        63px 90px 0 #d94b62,
        72px 90px 0 #ff7f8f,
        81px 90px 0 #ff7f8f,
        90px 90px 0 #ff7f8f,
        99px 90px 0 #1b2636,
        27px 99px 0 #1b2636,
        36px 99px 0 #ff7f8f,
        45px 99px 0 #ff7f8f,
        54px 99px 0 #d94b62,
        63px 99px 0 #ff7f8f,
        72px 99px 0 #ff7f8f,
        81px 99px 0 #ff7f8f,
        90px 99px 0 #1b2636,
        18px 108px 0 #1b2636,
        27px 108px 0 #ff7f8f,
        36px 108px 0 #ff7f8f,
        45px 108px 0 #d94b62,
        54px 108px 0 #ff7f8f,
        63px 108px 0 #1b2636,
        27px 117px 0 #1b2636,
        36px 117px 0 #ff7f8f,
        45px 117px 0 #ff7f8f,
        54px 117px 0 #ff7f8f,
        90px 108px 0 #1b2636,
        108px 108px 0 #1b2636,
        126px 108px 0 #1b2636,
        9px 126px 0 #1b2636,
        18px 126px 0 #ff7f8f,
        27px 126px 0 #ff7f8f,
        36px 126px 0 #ff7f8f,
        90px 117px 0 #1b2636,
        108px 117px 0 #1b2636,
        126px 117px 0 #1b2636,
        18px 135px 0 #1b2636,
        27px 135px 0 #1b2636;
    }

    .antenna {
      position: absolute;
      width: 160px;
      height: 60px;
      border-top: 2px solid rgba(255, 208, 216, 0.8);
      border-radius: 50%;
      top: 18px;
      left: 112px;
      transform: rotate(-18deg);
    }

    .antenna::after {
      content: "";
      position: absolute;
      width: 132px;
      height: 48px;
      border-top: 2px solid rgba(255, 208, 216, 0.55);
      border-radius: 50%;
      top: 10px;
      left: 2px;
      transform: rotate(12deg);
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.7;
      }
      50% {
        transform: translateY(-10px);
        opacity: 1;
      }
    }

    @keyframes drift {
      0%, 100% {
        transform: translateX(-18px) translateY(0);
      }
      50% {
        transform: translateX(-10px) translateY(-6px);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: rotate(-12deg) scale(1);
        opacity: .45;
      }
      50% {
        transform: rotate(-12deg) scale(1.08);
        opacity: .8;
      }
    }

    @media (max-width: 720px) {
      .wrap {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .creaturebox {
        order: -1;
      }

      .shrimp {
        transform: translateX(-28px) scale(.86);
      }

      @keyframes drift {
        0%, 100% {
          transform: translateX(-28px) scale(.86) translateY(0);
        }
        50% {
          transform: translateX(-20px) scale(.86) translateY(-6px);
        }
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section>
      <h1>303</h1>
      <h2>See Other</h2>
      <p>
        答えはここではなく、別の場所にあります。<br>
        えびが水底をすべるみたいに、そっと次のURLへ案内します。
      </p>
      <div class="small">HTTP STATUS PAGE / 303</div>
    </section>

    <section class="creaturebox" aria-hidden="true">
      <div class="flow"></div>
      <div class="bubble b1"></div>
      <div class="bubble b2"></div>
      <div class="bubble b3"></div>

      <div class="shrimp">
        <div class="antenna"></div>
      </div>
    </section>
  </main>
</body>
</html>
