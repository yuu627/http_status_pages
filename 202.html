  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top right, rgba(255, 166, 186, 0.12), transparent 26%),
        radial-gradient(circle at bottom left, rgba(140, 200, 255, 0.12), transparent 32%),
        linear-gradient(180deg, #06101d 0%, #0b1a2c 48%, #10263c 100%);
      color: #eef6ff;
      font-family: "DotGothic16", "Yu Gothic", sans-serif;
      overflow: hidden;
      padding: 24px;
    }

    .wrap {
      width: min(92%, 860px);
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 48px;
      align-items: center;
      padding: 40px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(6px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0;
      font-size: clamp(72px, 14vw, 140px);
      line-height: 0.95;
      letter-spacing: 0.04em;
      color: #ffd2dc;
    }

    h2 {
      margin: 14px 0 20px;
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 400;
      line-height: 1.2;
      color: #eef6ff;
    }

    p {
      margin: 0;
      font-size: 18px;
      line-height: 1.9;
      color: #d9e9f8;
    }

    .small {
      margin-top: 18px;
      font-size: 13px;
      letter-spacing: 0.08em;
      color: #90abc5;
      text-transform: uppercase;
    }

    .creaturebox {
      display: grid;
      place-items: center;
      position: relative;
      min-height: 220px;
    }

    .flow {
      position: absolute;
      width: 240px;
      height: 90px;
      border: 1px solid rgba(255, 210, 220, 0.24);
      border-radius: 50%;
      transform: rotate(-8deg);
      animation: pulse 5s ease-in-out infinite;
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(180, 220, 255, 0.16);
      animation: float 4s ease-in-out infinite;
    }

    .b1 { width: 18px; height: 18px; top: 12px; right: 26px; }
    .b2 { width: 10px; height: 10px; top: 54px; right: 74px; animation-delay: .8s; }
    .b3 { width: 14px; height: 14px; top: 96px; right: 18px; animation-delay: 1.6s; }

    .oarfish {
      display: grid;
      grid-template-columns: repeat(24, 10px);
      grid-template-rows: repeat(16, 10px);
      gap: 0;
      image-rendering: pixelated;
      filter:
        drop-shadow(0 12px 18px rgba(0,0,0,0.35))
        drop-shadow(0 0 18px rgba(255,210,220,0.18));
      animation: drift 5.2s ease-in-out infinite;
    }

    .px {
      width: 10px;
      height: 10px;
    }

    .o { background: #1b2636; }
    .s { background: #d1e1ee; }
    .m { background: #a8bfcf; }
    .w { background: #f7fbff; }
    .r { background: #ea5c6e; }
    .d { background: #c0374c; }

    @keyframes float {
      0%, 100% { transform: translateY(0); opacity: 0.7; }
      50% { transform: translateY(-10px); opacity: 1; }
    }

    @keyframes drift {
      0%, 100% { transform: translateX(0) translateY(0); }
      50% { transform: translateX(6px) translateY(-6px); }
    }

    @keyframes pulse {
      0%, 100% { transform: rotate(-8deg) scale(1); opacity: .45; }
      50% { transform: rotate(-8deg) scale(1.08); opacity: .8; }
    }

    @media (max-width: 720px) {
      .wrap {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .creaturebox {
        order: -1;
      }

      .oarfish {
        grid-template-columns: repeat(24, 8px);
        grid-template-rows: repeat(16, 8px);
      }

      .px {
        width: 8px;
        height: 8px;
      }
    }
  </style>
