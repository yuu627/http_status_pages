<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>404 Not Found</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top right, rgba(146, 190, 255, 0.15), transparent 30%),
        linear-gradient(180deg, #07111f 0%, #0b1c30 45%, #132942 100%);
      color: #eef6ff;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", sans-serif;
      overflow: hidden;
    }

    .wrap {
      width: min(90%, 820px);
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 48px;
      align-items: center;
      padding: 40px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(6px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0;
      font-size: clamp(72px, 14vw, 140px);
      line-height: 0.95;
      letter-spacing: 0.04em;
      color: #9fd4ff;
    }

    h2 {
      margin: 14px 0 20px;
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 700;
    }

    p {
      margin: 0;
      font-size: 18px;
      line-height: 1.9;
      color: #d9e9f8;
    }

    .fishbox {
      display: grid;
      place-items: center;
      position: relative;
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(180, 220, 255, 0.18);
      animation: float 4s ease-in-out infinite;
    }

    .b1 { width: 18px; height: 18px; top: 10px; right: 30px; }
    .b2 { width: 10px; height: 10px; top: 50px; right: 70px; animation-delay: .8s; }
    .b3 { width: 14px; height: 14px; top: 90px; right: 20px; animation-delay: 1.6s; }

    img {
      width: 180px;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter: drop-shadow(0 12px 18px rgba(0,0,0,0.35));
    }

    .small {
      margin-top: 18px;
      font-size: 13px;
      letter-spacing: 0.08em;
      color: #90abc5;
      text-transform: uppercase;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); opacity: 0.7; }
      50% { transform: translateY(-10px); opacity: 1; }
    }

    @media (max-width: 720px) {
      .wrap {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .fishbox {
        order: -1;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section>
      <h1>404</h1>
      <h2>Not Found</h2>
      <p>
        お探しのページは見つかりませんでした。<br>
        深い海のどこかに、静かに泳いでいってしまったみたいです。
      </p>
      <div class="small">HTTP STATUS PAGE / 404</div>
    </section>

    <section class="fishbox" aria-hidden="true">
      <div class="bubble b1"></div>
      <div class="bubble b2"></div>
      <div class="bubble b3"></div>
      <img
        alt="dot fish"
        src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAuklEQVR4nGNgGGjAiEtCRs3iP4z95NYJnOqY8Gl+PM8YwzC8LkBW+HieMYNs0lk4jcs1jOimB3fOQbHh/qWLDAwMDAyKevoMa8tTMAxhgtn2eJ4xhmaYRgYGBoa15SlweRk1i/8wi5lg/ix4nYnLmwwMDAwMRtG5WF3IKKNm8R+bIZ3e2igKw9qXoXgD5hWcYYBsQPnWq3BvwDTCXYCsGd0wmMvwxQJOAAuo/0ey/xOdDrAZQrLNQw8AAMqVVoZUr8Y5AAAAAElFTkSuQmCC">
    </section>
  </main>
</body>
</html>
