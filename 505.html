<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>505 HTTP Version Not Supported</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top right, rgba(196, 144, 255, 0.15), transparent 28%),
        radial-gradient(circle at bottom left, rgba(120, 200, 255, 0.12), transparent 34%),
        linear-gradient(180deg, #070f1d 0%, #0c1830 48%, #13233e 100%);
      color: #eef6ff;
      font-family: "DotGothic16", "Yu Gothic", sans-serif;
      overflow: hidden;
      padding: 24px;
    }

    .wrap {
      width: min(92%, 860px);
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 48px;
      align-items: center;
      padding: 40px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 28px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(6px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0;
      font-size: clamp(72px, 14vw, 140px);
      line-height: 0.95;
      letter-spacing: 0.04em;
      color: #d6b3ff;
    }

    h2 {
      margin: 14px 0 20px;
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 400;
      line-height: 1.2;
      color: #eef6ff;
    }

    p {
      margin: 0;
      font-size: 18px;
      line-height: 1.9;
      color: #d9e9f8;
    }

    .small {
      margin-top: 18px;
      font-size: 13px;
      letter-spacing: 0.08em;
      color: #90abc5;
      text-transform: uppercase;
    }

    .creaturebox {
      display: grid;
      place-items: center;
      position: relative;
      min-height: 220px;
    }

    .flow {
      position: absolute;
      width: 240px;
      height: 90px;
      border: 1px solid rgba(214, 179, 255, 0.24);
      border-radius: 50%;
      transform: rotate(-8deg);
      animation: pulse 5s ease-in-out infinite;
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(180, 220, 255, 0.16);
      animation: float 4s ease-in-out infinite;
    }

    .b1 {
      width: 18px;
      height: 18px;
      top: 12px;
      right: 26px;
    }

    .b2 {
      width: 10px;
      height: 10px;
      top: 54px;
      right: 74px;
      animation-delay: .8s;
    }

    .b3 {
      width: 14px;
      height: 14px;
      top: 96px;
      right: 18px;
      animation-delay: 1.6s;
    }

    .octopus {
      position: relative;
      width: 180px;
      height: 162px;
      transform: translateX(-8px);
      filter:
        drop-shadow(0 12px 18px rgba(0,0,0,0.35))
        drop-shadow(0 0 18px rgba(214,179,255,0.22));
      animation: drift 5.2s ease-in-out infinite;
    }

    .octopus::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 9px;
      height: 9px;
      background: transparent;
      box-shadow:
        72px 9px 0 #1b2636,
        81px 9px 0 #1b2636,
        54px 18px 0 #1b2636,
        63px 18px 0 #1b2636,
        72px 18px 0 #b77bff,
        81px 18px 0 #b77bff,
        90px 18px 0 #1b2636,
        99px 18px 0 #1b2636,
        45px 27px 0 #1b2636,
        54px 27px 0 #1b2636,
        63px 27px 0 #b77bff,
        72px 27px 0 #b77bff,
        81px 27px 0 #b77bff,
        90px 27px 0 #b77bff,
        99px 27px 0 #1b2636,
        108px 27px 0 #1b2636,
        36px 36px 0 #1b2636,
        45px 36px 0 #1b2636,
        54px 36px 0 #b77bff,
        63px 36px 0 #e6d4ff,
        72px 36px 0 #e6d4ff,
        81px 36px 0 #e6d4ff,
        90px 36px 0 #e6d4ff,
        99px 36px 0 #b77bff,
        108px 36px 0 #b77bff,
        117px 36px 0 #1b2636,
        126px 36px 0 #1b2636,
        36px 45px 0 #1b2636,
        45px 45px 0 #b77bff,
        54px 45px 0 #b77bff,
        63px 45px 0 #e6d4ff,
        72px 45px 0 #e6d4ff,
        81px 45px 0 #e6d4ff,
        90px 45px 0 #e6d4ff,
        99px 45px 0 #b77bff,
        108px 45px 0 #b77bff,
        117px 45px 0 #b77bff,
        126px 45px 0 #1b2636,
        27px 54px 0 #1b2636,
        36px 54px 0 #1b2636,
        45px 54px 0 #b77bff,
        54px 54px 0 #b77bff,
        63px 54px 0 #e6d4ff,
        72px 54px 0 #fff8ff,
        81px 54px 0 #fff8ff,
        90px 54px 0 #e6d4ff,
        99px 54px 0 #b77bff,
        108px 54px 0 #b77bff,
        117px 54px 0 #b77bff,
        126px 54px 0 #1b2636,
        135px 54px 0 #1b2636,
        27px 63px 0 #1b2636,
        36px 63px 0 #b77bff,
        45px 63px 0 #b77bff,
        54px 63px 0 #b77bff,
        63px 63px 0 #b77bff,
        72px 63px 0 #b77bff,
        81px 63px 0 #b77bff,
        90px 63px 0 #b77bff,
        99px 63px 0 #b77bff,
        108px 63px 0 #b77bff,
        117px 63px 0 #b77bff,
        126px 63px 0 #b77bff,
        135px 63px 0 #1b2636,
        27px 72px 0 #1b2636,
        36px 72px 0 #b77bff,
        45px 72px 0 #9257d8,
        54px 72px 0 #b77bff,
        63px 72px 0 #b77bff,
        72px 72px 0 #b77bff,
        81px 72px 0 #b77bff,
        90px 72px 0 #b77bff,
        99px 72px 0 #b77bff,
        108px 72px 0 #b77bff,
        117px 72px 0 #b77bff,
        126px 72px 0 #b77bff,
        135px 72px 0 #1b2636,
        36px 81px 0 #1b2636,
        45px 81px 0 #b77bff,
        54px 81px 0 #b77bff,
        63px 81px 0 #b77bff,
        72px 81px 0 #b77bff,
        81px 81px 0 #b77bff,
        90px 81px 0 #b77bff,
        99px 81px 0 #b77bff,
        108px 81px 0 #b77bff,
        117px 81px 0 #b77bff,
        126px 81px 0 #1b2636,
        36px 90px 0 #1b2636,
        45px 90px 0 #1b2636,
        54px 90px 0 #b77bff,
        63px 90px 0 #b77bff,
        72px 90px 0 #b77bff,
        81px 90px 0 #b77bff,
        90px 90px 0 #b77bff,
        99px 90px 0 #b77bff,
        108px 90px 0 #b77bff,
        117px 90px 0 #1b2636,
        126px 90px 0 #1b2636,
        45px 99px 0 #1b2636,
        54px 99px 0 #b77bff,
        63px 99px 0 #9257d8,
        72px 99px 0 #1b2636,
        81px 99px 0 #b77bff,
        90px 99px 0 #b77bff,
        99px 99px 0 #1b2636,
        108px 99px 0 #9257d8,
        117px 99px 0 #b77bff,
        126px 99px 0 #1b2636,
        45px 108px 0 #1b2636,
        54px 108px 0 #b77bff,
        72px 108px 0 #1b2636,
        99px 108px 0 #1b2636,
        117px 108px 0 #b77bff,
        126px 108px 0 #1b2636,
        45px 117px 0 #1b2636,
        54px 117px 0 #b77bff,
        72px 117px 0 #1b2636,
        99px 117px 0 #1b2636,
        117px 117px 0 #b77bff,
        126px 117px 0 #1b2636,
        54px 126px 0 #1b2636,
        72px 126px 0 #1b2636,
        99px 126px 0 #1b2636,
        117px 126px 0 #1b2636,
        54px 135px 0 #1b2636,
        117px 135px 0 #1b2636;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.7;
      }
      50% {
        transform: translateY(-10px);
        opacity: 1;
      }
    }

    @keyframes drift {
      0%, 100% {
        transform: translateX(-8px) translateY(0);
      }
      50% {
        transform: translateX(-2px) translateY(-6px);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: rotate(-8deg) scale(1);
        opacity: .45;
      }
      50% {
        transform: rotate(-8deg) scale(1.08);
        opacity: .8;
      }
    }

    @media (max-width: 720px) {
      .wrap {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .creaturebox {
        order: -1;
      }

      .octopus {
        transform: translateX(-6px) scale(.9);
      }

      @keyframes drift {
        0%, 100% {
          transform: translateX(-6px) scale(.9) translateY(0);
        }
        50% {
          transform: translateX(0) scale(.9) translateY(-6px);
        }
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section>
      <h1>505</h1>
      <h2>HTTP Version Not Supported</h2>
      <p>
        そのHTTPバージョンには、このサーバーは対応していません。<br>
        タコみたいに器用でも、届かない手があります。
      </p>
      <div class="small">HTTP STATUS PAGE / 505</div>
    </section>

    <section class="creaturebox" aria-hidden="true">
      <div class="flow"></div>
      <div class="bubble b1"></div>
      <div class="bubble b2"></div>
      <div class="bubble b3"></div>

      <div class="octopus"></div>
    </section>
  </main>
</body>
</html>
